

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - AdministraciÃ³n de Usuarios</title>
    <!-- Bootstrap 4.3.1 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

    <!-- NAV -->
    <div th:insert="~{fragments/navbar :: navbar}"></div>
    <!-- FIN NAV -->

    <div class="container mt-5">
        <h2 class="text-center">AdministraciÃ³n de Usuarios</h2>

        <!-- Mensajes de Ã©xito o error -->
        <div th:if="${message}" class="alert alert-success fade-out" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div th:if="${error}" class="alert alert-danger fade-out" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <style>
            /* AnimaciÃ³n para ocultar mensajes despuÃ©s de 3 segundos */
            .fade-out {
                animation: fadeOut 3s forwards;
            }
            @keyframes fadeOut {
                0% { opacity: 1; }
                90% { opacity: 1; }
                100% { opacity: 0; display: none; }
            }
        </style>

        <table class="table table-striped table-dark">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre de Usuario</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.firstName}"></td>
                    <td th:text="${user.rol.name}"></td>
                    <td>
                        <!-- Formulario para actualizar rol -->
                        <form action="/admin/updateRol" method="post" class="d-inline">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <input type="hidden" name="userId" th:value="${user.id}">
                            <select name="rol" class="custom-select custom-select-sm w-auto d-inline" required>
                                <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"
                                    th:selected="${role.id == user.rol.id}"></option>
                            </select>
                            <button type="submit" class="btn btn-warning btn-sm">Actualizar Rol</button>
                        </form>

                        <!-- Formulario para eliminar usuario -->
                        <form action="/admin/deleteUser" method="post" class="d-inline"
                            onsubmit="return confirm('Â¿EstÃ¡s seguro de que quieres eliminar este usuario?');">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <input type="hidden" name="userId" th:value="${user.id}">
                            <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Scripts de Bootstrap 4.3.1 -->
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
