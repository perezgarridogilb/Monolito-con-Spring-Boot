<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Página no encontrada</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212; /* Fondo oscuro */
            color: #e0e0e0; /* Texto claro */
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Asegura que el cuerpo ocupe toda la altura */
            justify-content: center; /* Centrar verticalmente */
            align-items: center; /* Centrar horizontalmente */
            overflow-x: hidden; /* Evitar scroll horizontal */
            font-family: 'Montserrat', sans-serif; /* Fuente moderna */
            text-align: center; /* Centrar el texto */
        }
        .container {
            background: #1a1a1a; /* Fondo del contenedor */
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 500px; /* Ancho máximo */
            width: 100%; /* Ancho completo en móviles */
        }
        h1 {
            font-size: 5em;
            margin: 0;
            color: #00bcd4; /* Color vibrante */
        }
        h2 {
            font-size: 1.5em;
            margin: 10px 0 20px;
        }
        p {
            font-size: 1.1em;
            margin: 15px 0;
            line-height: 1.5;
        }
        a {
            text-decoration: none;
            background-color: #00bcd4; /* Botón color vibrante */
            color: white;
            padding: 12px 24px;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
            font-weight: 600;
            display: inline-block; /* Para centrar el botón */
        }
        a:hover {
            background-color: #0097a7; /* Color más oscuro al pasar el mouse */
            transform: translateY(-2px); /* Efecto de elevación */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Página No Encontrada</h2>
        <p>Lo sentimos, la página que estás buscando no existe o ha sido movida.</p>
        <p><a href="/" class="btn">Volver a la página principal</a></p>
    </div>
</body>
</html>
