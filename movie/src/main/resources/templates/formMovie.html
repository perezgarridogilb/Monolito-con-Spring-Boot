<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
     <link rel="stylesheet" th:href="@{/css/style.css}" />

    <title>Hello, world!</title>
  </head>
  <body>
    <!-- NAV -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
  <!-- FIN NAV -->

   <!-- CONTAINER -->
  <div class="container mt-4 mb-4">
     <h1 th:text="${movie.id != null} ? 'Edit movie' : 'New movie'">Nueva Pelicula</h1>

    <!-- ROW -->
    <div class="row">
 <form th:action="${movie.id != null} ? @{/movies/update} : @{/movies/save}"  th:object="${movie}"  enctype="multipart/form-data" method="post" class="col-md-12">
        <input type="hidden" th:field="*{id}">
        <div class="form-group"><!-- Movie name-->
          <label for="name">Name</label>
          <input type="text" class="form-control" th:field="*{name}" id="name" placeholder="Movie name">
          <div th:if="${#fields.hasErrors('name')}" class="text-danger">
<span th:errors="*{name}">Error</span>
</div>
        </div>
        <div class="form-group"><!--Movie description-->
          <label for="description">Description</label>
          <textarea class="form-control" th:field="*{description}" id="description" rows="3"
            placeholder="Movie description"></textarea>
            <div th:if="${#fields.hasErrors('description')}" class="text-danger">
<span th:errors="*{description}">Error</span>
</div>
        </div>
        <div class="form-group"><!--Movie img-->
          <label for="img">Image</label>
                              <div th:if="${movie.img != null}">
                        <img th:src="@{/images/{imagen}(imagen=${movie.img})}" alt="Imagen de la película" style="max-width: 200px;" />
                        <p th:text="${movie.img}"></p> <!-- Mostrar el nombre del archivo -->
                    </div>
                    <input type="file" id="img" name="imageFile"> <!-- Cambiado a "imageFile" -->	
          <div th:if="${#fields.hasErrors('img')}" class="text-danger">
<span th:errors="*{img}">Error</span>
</div>
        </div>
        <div class="form-group"><!--Movie vendor-->
          <label for="vendor">Vendor</label>
          <select class="form-control" th:field="*{vendor}" id="vendor">
            <option th:each="vendor : ${vendors}" th:value="${vendor.id}" th:text="${vendor.name}"></option>
          </select>
                              <div th:if="${#fields.hasErrors('vendor')}" class="text-danger">
<span th:errors="*{vendor}">Error</span>
</div>
        </div>
        <button type="submit" class="btn btn-success" th:text="${movie.id != null} ? 'Update' : 'Save'">Save</button>
<button type="button" class="btn btn-secondary" onclick="window.history.back();">Cancelar</button>
      </form>
  
    </div> <!-- FIN ROW -->
  </div> <!-- FIN CONTAINER -->

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  </body>
</html>
