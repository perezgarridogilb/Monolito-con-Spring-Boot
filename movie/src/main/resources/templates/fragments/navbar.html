<!-- navbar.html -->
<div th:fragment="navbar">
    <div class=" bg">
        <nav class="navbar navbar-expand-lg navbar-dark" id="mainNavbar">
            <div class="container d-flex justify-content-between">
                <!-- Ajuste para el navbar-brand y el botÃ³n en el mismo contenedor -->
                <a class="navbar-brand" th:href="@{/}">App - Movie</a>

                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <!-- User menu for authenticated users -->
                <ul class="navbar-nav ml-auto" sec:authorize="isAuthenticated()">
                    <li class="nav-item dropdown" sec:authorize="hasRole('ROLE_ADMIN')">
                        <a class="nav-link dropdown-toggle mr-3" href="#" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <span sec:authentication="name"></span>
                        </a>
                        <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <a class="dropdown-item" th:href="@{/admin/dashboard}">Dashboard</a>
                            <a class="dropdown-item" th:href="@{/genres/list}">Genres</a>
                        </div>
                    </li>
                    <li class="nav-item" sec:authorize="!hasRole('ROLE_ADMIN')">
                        <span id="nc" class="nav-link mr-3 text" sec:authentication="name"></span>
                    </li>
                </ul>

                <!-- Logout button for authenticated users -->
                <form sec:authorize="isAuthenticated()" method="post" action="/logout" class="d-inline me-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>

                <!-- Register and Login links for unauthenticated users -->
                <ul class="navbar-nav ml-auto" sec:authorize="!isAuthenticated()">
                    <li class="nav-item mr-2">
                        <a class="nav-link  me-2 text-white" href="/register">Register</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/login">Login</a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</div>
