<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Administración de Géneros</title>
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    /* Estilos para la tabla */
    h2 {
      color: #00bcd4;
    }

    tr {
      color: #00bcd4;
    }

    .table tbody tr:hover {
      color: #fff;
    }

    .table {
      background: #1a1a1a; /* Fondo de la tabla */
      color: #00bcd4; /* Texto en color vibrante */
    }

    .thead-dark th {
      background-color: #333333; /* Fondo oscuro para el encabezado de la tabla */
      color: #00bcd4; /* Texto en color vibrante en el encabezado */
    }

    .table-striped tbody tr:nth-of-type(odd) {
      background-color: #2a2a2a; /* Color de fondo para filas impares */
    }

    .table-striped tbody tr:hover {
      background-color: #333333; /* Color de fondo al pasar el mouse */
    }

    /* Animación para desvanecimiento de mensajes */
    .fade-out {
      animation: fadeOut 3s forwards;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        display: none;
      }
    }
  </style>
</head>
<body>
<!-- NAV -->
<div th:insert="~{fragments/navbar :: navbar}"></div>
<!-- FIN NAV -->

<div class="container mt-5">
  <h2 class="text-center">Administración de Géneros</h2>

  <!-- Mensajes de éxito o error -->
  <div th:if="${message}" class="alert alert-success fade-out" role="alert">
    <span th:text="${message}"></span>
    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  
  <div th:if="${error}" class="alert alert-danger fade-out" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <!-- Botón de Agregar Género en la esquina superior derecha -->
  <div class="text-right mb-3">
    <a href="/genres/add" class="btn btn-success">
      <i class="fas fa-plus"></i> Agregar Género
    </a>
  </div>

  <!-- Tabla de Géneros -->
  <table class="table table-striped table-hover">
    <thead class="thead-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="genre : ${genres}">
        <td th:text="${genre.id}"></td>
        <td th:text="${genre.name}"></td>
        <td>
          <!-- Botón para editar género -->
          <a th:href="@{/genres/edit/{id}(id=${genre.id})}" class="btn btn-primary btn-sm mr-2">
            <i class="fas fa-edit"></i> Editar
          </a>
          
          <!-- Formulario para eliminar género -->
          <form th:action="@{/genres/delete/{id}(id=${genre.id})}" method="post"
                class="d-inline"
                onsubmit="return confirm('¿Estás seguro de que quieres eliminar este género?');">
            <button type="submit" class="btn btn-danger btn-sm">
              <i class="fas fa-trash-alt"></i> Eliminar
            </button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Font Awesome for Icons -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script
    src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script
    src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
