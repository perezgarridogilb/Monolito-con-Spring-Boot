              <p><strong>Vendor:</strong> <span class="badge badge-pill 
          badge-warning" th:text="${movie.vendor.name}"></span></p>
              <p th:text="${#strings.abbreviate(movie.description, 70)}" class="card-text">

              </p>
            </div>
          </div>
        </a>

    <!-- PaginaciÃ³n -->
    <div th:if="${totalPages > 1}">
      <nav aria-label="Page navigation example">
        <ul class="pagination justify-content-center">
          <!-- BotÃ³n de pÃ¡gina anterior -->
          <li th:classappend="${currentPage == 0} ? 'disabled' : ''" class="page-item">
            <!-- Sin filtros -->
            <a th:href="@{/(page=${currentPage - 1})}" th:if="${vendorId == 
null and query == null}" class="page-link">Previous</a>
            <!-- Filtro por proveedor -->
            <a th:href="@{/movieByVendor(vendorId=${vendorId}, 
page=${currentPage - 1})}" th:if="${vendorId != null}" class="page-link">Previous</a>
            <!-- Filtro por bÃºsqueda -->
            <a th:href="@{/search(q=${query}, page=${currentPage - 1})}" th:if="${query != null}"
              class="page-link">Previous</a>
          </li>
          <!-- NÃºmeros de pÃ¡gina -->
          <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active' : ''"
            th:if="${i >= currentPage - 4 and i <= currentPage + 4}" class="page-item">
            <!-- Sin filtros -->
            <a th:href="@{/(page=${i})}" th:if="${vendorId == null and query 
== null}" th:text="${i + 1}" class="page-link"></a>
            <!-- Filtro por proveedor -->
            <a th:href="@{/movieByVendor(vendorId=${vendorId}, page=${i})}" th:if="${vendorId != null}"
              th:text="${i + 1}" class="page-link"></a>
            <!-- Filtro por bÃºsqueda -->
            <a th:href="@{/search(q=${query}, page=${i})}" th:if="${query != 
null}" th:text="${i + 1}" class="page-link"></a>
          </li>
          <!-- BotÃ³n de pÃ¡gina siguiente -->
          <li th:classappend="${currentPage == totalPages - 1} ? 'disabled' : 
''" class="page-item">
            <!-- Sin filtros -->
            <a th:href="@{/(page=${currentPage + 1})}" th:if="${vendorId == 
null and query == null}" class="page-link">Next</a>
            <!-- Filtro por proveedor -->
            <a th:href="@{/movieByVendor(vendorId=${vendorId}, 
page=${currentPage + 1})}" th:if="${vendorId != null}" class="page-link">Next</a>
            <!-- Filtro por bÃºsqueda -->
            <a th:href="@{/search(q=${query}, page=${currentPage + 1})}" th:if="${query != null}"
              class="page-link">Next</a>
          </li>
        </ul>
      </nav>
    </div><!-- fin if-->
