<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
     <link rel="stylesheet" th:href="@{/css/style.css}" />

    <title>Hello, world!</title>
  </head>
  <body>
    <!-- NAV -->
  <div class="row bg">
    <nav class="navbar navbar-expand-lg navbar-dark container">
      <a class="navbar-brand" href="#">App - Movie</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle 
    navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item">
            <a class="nav-link" href="#">Register</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Login</a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
  <!-- FIN NAV -->


<div class="container">
<div class="row mt-5 mr-4">
<div class="col-12 col-md-10 mb-4 d-flex align-items-center justify-content-center 
justify-content-md-start">
<form th:action="@{/search}" class="search-bar d-flex w-100" style="margin-left: 
25px;">
<input name="q" class="form-control w-65" placeholder="Search for movies...">
<button class="btn btn-secondary bu ml-2" type="submit">Search</button>
</form>
</div>
<div class="col-12 col-md-2 mb-4 d-flex align-items-center justify-content-end">
<a href="/movies/create" class="btn btn-success">New movie</a>
</div>
</div>
</div>

 <!-- CONTAINER -->
<div class="container mt-4 mb-4">
  <!-- ROW -->
  <div class="row">
      <!-- CARD -->

  <!-- CARD -->
        <div th:each="movie : ${movies}" class="col-12 col-sm-6 col-md-3 mb-4">
          <a th:href="@{/moviesDetails/{id}(id=${movie.id})}" class="movie-card" style="display: 
          block; text-decoration: none; color: inherit;">
            <div class="card">
              <img th:src="${movie.img}" class="card-img-top" alt="movie">
              <div class="card-body">
                <h5 th:text="${movie.name}" class="card-title">Movie title</h5>
                <p><strong>Genre:</strong> <span>Action</span></p>
                <p><strong>Vendor:</strong> <span class="badge badge-pill 
          badge-warning" th:text="${movie.vendor.name}"></span></p>
                <p th:text="${#strings.abbreviate(movie.description, 70)}" class="card-text">
                  <strong>Description:</strong> Movie description.
                </p>
              </div>
            </div>
          </a>                          
  </div> <!-- FIN ROW -->        
</div> <!-- FIN CONTAINER --> 

    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
  </body>
</html>
