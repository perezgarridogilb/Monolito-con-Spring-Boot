<div class="container mt-4 mb-4"> <!-- CONTAINER -->
      <div class="row"> <!-- ROW -->
        <div class="col-md-6">
          <img th:src="${movie.img}" class="card-img-top" alt="movie">
        </div>
        <div class="col-md-6">
          <h5 th:text="${movie.name}" class="card-title">Movie title</h5>
          <p><strong>Genre:</strong> <span>Action</span></p>
          <p><strong>Vendor:</strong> <a th:href="@{/movieByVendor(vendorId=${movie.vendor.id})}"
              class="badge badge-pill badge-warning" th:text="${movie.vendor.name}"></a></p>
          <p th:text="${movie.description}" class="card-text">
            <strong>Description:</strong> Movie description.
          </p>

          <a th:href="@{/movies/edit/{id}(id=${movie.id})}" class="btn btn-primary">Editar</a>

<form th:action="@{/movies/delete/{id}(id=${movie.id})}" method="post"

<button type="submit" class="btn btn-danger">Eliminar</button>
</form>


        </div>
      </div>
