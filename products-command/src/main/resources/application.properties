spring.application.name=products-command
server.port=8081
spring.cloud.function.definition=handleCommands;replies

# Configura el topic de Kafka al que se conecta este consumidor
spring.cloud.stream.bindings.handleCommands-in-0.destination=products.commands

# Define el formato de datos; Spring lo deserializará automáticamente al DTO
spring.cloud.stream.bindings.handleCommands-in-0.contentType=application/json

# Asigna un grupo de consumidores para gestionar offsets y evitar pérdida de mensajes
spring.cloud.stream.bindings.handleCommands-in-0.group=products-command

# Dirección de conexión al servidor de Kafka
spring.cloud.stream.kafka.binder.brokers=localhost:9092

spring.cloud.stream.bindings.handleCommands-in-0.startOffset=latest
spring.cloud.stream.bindings.handleCommands-out-0.destination=products.replies
spring.cloud.stream.bindings.handleCommands-out-0.contentType=application/json

spring.cloud.function.definition=handleReplies
spring.cloud.stream.bindings.handleReplies-in-0.destination=products.replies
spring.cloud.stream.bindings.handleReplies-in-0.contentType=application/json
spring.cloud.stream.bindings.handleReplies-in-0.group=products-api
spring.cloud.stream.kafka.bindings.handleReplies-in-0.consumer.startOffset=latest

spring.datasource.url=jdbc:mysql://localhost:3309/db_spring_kafka?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (Crucial para que no choque con Flyway)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.cloud.stream.bindings.handleCommands-out-0.producer.useNativeEncoding=true